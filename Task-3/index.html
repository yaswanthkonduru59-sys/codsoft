<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display" placeholder="0" readonly>
        
        <div class="buttons">
            <button class="btn" onclick="handleButtonClick('7')">7</button>
            <button class="btn" onclick="handleButtonClick('8')">8</button>
            <button class="btn" onclick="handleButtonClick('9')">9</button>
            <button class="btn operator" onclick="handleOperator('+')">+</button>

            <button class="btn" onclick="handleButtonClick('4')">4</button>
            <button class="btn" onclick="handleButtonClick('5')">5</button>
            <button class="btn" onclick="handleButtonClick('6')">6</button>
            <button class="btn operator" onclick="handleOperator('-')">-</button>

            <button class="btn" onclick="handleButtonClick('1')">1</button>
            <button class="btn" onclick="handleButtonClick('2')">2</button>
            <button class="btn" onclick="handleButtonClick('3')">3</button>
            <button class="btn operator" onclick="handleOperator('*')">*</button>

            <button class="btn" onclick="handleButtonClick('0')">0</button>
            <button class="btn" onclick="handleDecimal()">.</button>
            <button class="btn operator" onclick="handleOperator('/')">÷</button>
            <button class="btn operator equal" onclick="performCalculation()">=</button>
        </div>
        
        <button class="btn clear-btn" onclick="clearDisplay()">CLEAR</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
